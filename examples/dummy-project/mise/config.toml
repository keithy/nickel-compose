# mise.toml-equivalent for the dummy project.
#
# Demonstrates how to wire nickel-compose into an existing project via
# the mise cd hook. Same pattern works in your project: copy this file,
# adjust paths, drop in.
#
# Install: `mise trust && mise install`.

[tools]
"github:nickel-lang/nickel" = "1.17.0"

[hooks]
# On cd into this project, regenerate compose.yml from the
# current NICKEL_COMPOSE (which references COMPOSE_SERVICES,
# COMPOSE_OVERLAYS, COMPOSE_FILE). The wrapper assembles the
# fragment list in order. See WORKFLOW.md for migration stages.
cd = "QUIET=true ./wrappers/from-nickel-compose.sh"

[env]
# Migration stage 1: services / overlays / file in separate env vars.
# Each is a colon-separated fragment list. NICKEL_COMPOSE tells
# the wrapper which env vars to assemble and in what order.
COMPOSE_SERVICES = "services/web.yml:services/db.yml"
COMPOSE_OVERLAYS = "overlays/dev.yml"
COMPOSE_FILE = "base.yml"
NICKEL_COMPOSE = "$COMPOSE_SERVICES:$COMPOSE_OVERLAYS:$COMPOSE_FILE"

[task_config]
# In a real project, nickel-compose would be a submodule at ./nickel-compose/
# and this would be `includes = ["nickel-compose/mise/tasks"]`.
# For this self-contained example we point at the in-repo path.
includes = ["../../mise/tasks"]

[settings]
# Trust nickel and jq so mise exec works without prompts.
idiomatic_version_file_enable_tools = ["jq"]