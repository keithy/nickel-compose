# mise.toml-equivalent for the dummy project.
#
# Demonstrates how to wire nickel-compose into an existing project via
# the mise cd hook. Same pattern works in your project: copy this file,
# adjust paths, drop in.
#
# Install: `mise trust && mise install`.

[tools]
"github:nickel-lang/nickel" = "1.17.0"

[hooks]
# On cd into this project, regenerate compose.yml from the
# current COMPOSE_FILE. The wrapper reads $COMPOSE_FILE (set in your
# .env, .bashrc, or below in [env]) and renders compose.yml.
cd = "QUIET=true ./wrappers/from-compose-file.sh"

[env]
# Optional: set COMPOSE_FILE here if you don't set it elsewhere.
# Replace with your own fragments.
COMPOSE_FILE = "compose.yml:services/web.yml:services/db.yml:overlays/dev.yml"

[task_config]
# In a real project, nickel-compose would be a submodule at ./nickel-compose/
# and this would be `includes = ["nickel-compose/mise/tasks"]`.
# For this self-contained example we point at the in-repo path.
includes = ["../../mise/tasks"]

[settings]
# Trust nickel and jq so mise exec works without prompts.
idiomatic_version_file_enable_tools = ["jq"]